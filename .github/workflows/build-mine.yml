name: Build mine

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x86_64
            binary: mine
          - os: macos-latest
            name: macos-arm64
            binary: mine
          - os: windows-latest
            name: windows-x86_64
            binary: mine.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup SBCL
        uses: coalton-lang/coalton-runners/setup-sbcl@main

      # --- Build ---

      - name: Build mine (Unix)
        if: runner.os != 'Windows'
        run: bash mine/ci/build-mine.sh

      - name: Build mine (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\mine\ci\build-mine.ps1

      # --- Upload ---

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: mine-${{ matrix.name }}
          path: |
            mine/${{ matrix.binary }}
            mine/README.md

  build-app:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos-arm64
            mine-artifact: mine-macos-arm64
            mine-binary: mine
            sidecar: mine-aarch64-apple-darwin
            bundles: app
            create-dmg: "1"
            app-path: mine/mine-app/src-tauri/target/release/bundle/macos/mine.dmg
          - os: windows-latest
            name: windows-x86_64
            mine-artifact: mine-windows-x86_64
            mine-binary: mine.exe
            sidecar: mine-x86_64-pc-windows-msvc.exe
            bundles: nsis
            create-dmg: "0"
            app-path: mine/mine-app/src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Download mine binary
        uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.mine-artifact }}
          path: mine-binary

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build mine-app
        shell: bash
        env:
          MINE_SIDECAR_SOURCE: mine-binary/${{ matrix.mine-binary }}
          MINE_SIDECAR_NAME: ${{ matrix.sidecar }}
          MINE_APP_BUNDLES: ${{ matrix.bundles }}
          MINE_CREATE_DMG: ${{ matrix.create-dmg }}
        run: |
          bash mine/ci/build-mine-app.sh

      - name: Upload app artifact
        uses: actions/upload-artifact@v6
        with:
          name: mine-app-${{ matrix.name }}
          path: ${{ matrix.app-path }}
