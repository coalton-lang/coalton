name: Build mine

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x86_64
            binary: mine
          - os: macos-latest
            name: macos-arm64
            binary: mine
          - os: windows-latest
            name: windows-x86_64
            binary: mine.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup SBCL
        uses: coalton-lang/coalton-runners/setup-sbcl@main

      # --- Build ---

      - name: Build mine (Unix)
        if: runner.os != 'Windows'
        run: bash mine/ci/build-mine.sh

      - name: Build mine (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\mine\ci\build-mine.ps1

      # --- Upload ---

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: mine-${{ matrix.name }}
          path: |
            mine/${{ matrix.binary }}
            mine/README.md

  build-app:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos-arm64
            mine-artifact: mine-macos-arm64
            mine-binary: mine
            sidecar: mine-core-aarch64-apple-darwin
            bundles: app
            create-dmg: "1"
            app-path: mine/mine-app/src-tauri/target/release/bundle/macos/mine.dmg
          - os: windows-latest
            name: windows-x86_64
            mine-artifact: mine-windows-x86_64
            mine-binary: mine.exe
            sidecar: mine-core-x86_64-pc-windows-msvc.exe
            bundles: nsis
            create-dmg: "0"
            app-path: mine/mine-app/src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Download mine binary
        uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.mine-artifact }}
          path: mine-binary

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build mine-app
        shell: bash
        env:
          MINE_SIDECAR_SOURCE: mine-binary/${{ matrix.mine-binary }}
          MINE_SIDECAR_NAME: ${{ matrix.sidecar }}
          MINE_APP_BUNDLES: ${{ matrix.bundles }}
          MINE_CREATE_DMG: ${{ matrix.create-dmg }}
        run: |
          bash mine/ci/build-mine-app.sh

      - name: Upload app artifact
        uses: actions/upload-artifact@v6
        with:
          name: mine-app-${{ matrix.name }}
          path: ${{ matrix.app-path }}

  # Linux AppImage path is structured differently: rather than wrapping
  # a single mine binary as a Tauri sidecar, we ship an SBCL-runtime +
  # saved-core trio to side-step linuxdeploy's patchelf step (which
  # otherwise corrupts SBCL's appended core image).  Driven entirely
  # by ci/build-mine.sh + ci/build-mine-app-linux.sh.
  build-app-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Tauri Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libxdo-dev libssl-dev \
            pkg-config file curl unzip jq

      - name: Setup SBCL
        uses: coalton-lang/coalton-runners/setup-sbcl@main

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build mine.core
        env:
          MINE_AS_CORE: "1"
        run: bash mine/ci/build-mine.sh

      - name: Build AppImage
        env:
          MINE_CORE_SOURCE: ${{ github.workspace }}/mine/mine.core
        run: bash mine/ci/build-mine-app-linux.sh

      - name: Upload app artifact
        uses: actions/upload-artifact@v6
        with:
          name: mine-app-${{ matrix.name }}
          path: mine/mine.AppImage
