name: Build mine

on:
  push:
    tags:
      - 'mine-v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            binary: mine
          - os: macos-latest
            name: macos-arm64
            binary: mine
          - os: windows-latest
            name: windows-x86_64
            binary: mine.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup SBCL
        uses: coalton-lang/coalton-runners/setup-sbcl@main

      # --- Build ---

      - name: Build mine (Unix)
        if: runner.os != 'Windows'
        run: |
          cd mine
          CL_SOURCE_REGISTRY="${GITHUB_WORKSPACE}//" \
            sbcl --dynamic-space-size 4096 \
            --noinform --non-interactive \
            --eval '(ql:quickload "mine" :verbose t)' \
            --eval '(mine/app/mine:build)'

      - name: Build mine (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:CL_SOURCE_REGISTRY = "$env:GITHUB_WORKSPACE//"
          cd mine
          sbcl --dynamic-space-size 4096 `
            --noinform --non-interactive `
            --eval '(ql:quickload "mine" :verbose t)' `
            --eval '(mine/app/mine:build)'

      # --- Upload ---

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mine-${{ matrix.name }}
          path: |
            mine/${{ matrix.binary }}
            mine/README.md

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release files
        run: |
          chmod +x mine-linux-x86_64/mine mine-macos-arm64/mine
          for platform in linux-x86_64 macos-arm64 windows-x86_64; do
            mkdir -p "mine-${platform}/mine"
            mv mine-${platform}/* "mine-${platform}/mine/" 2>/dev/null || true
            cd "mine-${platform}"
            zip -r "../mine-${platform}.zip" mine/
            cd ..
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mine-linux-x86_64.zip
            mine-macos-arm64.zip
            mine-windows-x86_64.zip
          generate_release_notes: true
