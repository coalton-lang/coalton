name: Test Lisp environments (abcl, clasp)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  workflow_dispatch:

jobs:

  check-image:
    runs-on: ubuntu-latest
    outputs:
      image_repo_name: ${{ steps.set-repo.outputs.image_repo_name }}
      repo_name: ${{ steps.set-repo.outputs.repo_name }}
    steps:
      - name: Check if primary image exists
        id: set-repo
        run: |
          PRIMARY="ghcr.io/${{ github.repository_owner }}/sbcl-base:latest"
          OFFICIAL="ghcr.io/coalton-lang/sbcl-base:latest"
          if docker manifest inspect $PRIMARY > /dev/null 2>&1; then
            echo Will use PRIMARY image $PRIMARY >&2
            echo "image_repo_name=${{ github.repository_owner }}" >> $GITHUB_OUTPUT
          else # Note - for some reason I cannot pull the image from coalton-lang
            if docker manifest inspect $OFFICIAL > /dev/null 2>&1; then
              echo Failed to access PRIMARY image $PRIMARY >&2
              echo Instead will use OFFICIAL image $OFFICIAL >&2
              echo "image_repo_name=coalton-lang" >> $GITHUB_OUTPUT
            else
              echo Failed to access OFFICIAL image $OFFICIAL >&2
              exit 1
            fi
          fi
          echo repo_name="${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest

    needs: check-image

    strategy:
      fail-fast: false
      matrix:
        # ecl seems to be fine with all external packages
        LISP_IMPL: [ "abcl", "clasp" #, "ecl"
                    ]
    permissions:
      packages: read

    container:
      image: ghcr.io/${{ needs.check-image.outputs.image_repo_name }}/${{ matrix.LISP_IMPL }}-port
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      env:
        # Tell ASDF to look through our repo recursively
        # See https://github.com/actions/runner/issues/2058
        # CL_SOURCE_REGISTRY: "${{ github.workspace }}//"
        CL_SOURCE_REGISTRY: "/__w/${{ needs.check-image.outputs.repo_name }}/${{ needs.check-image.outputs.repo_name }}//"

    steps:
      - uses: actions/checkout@v3

      - name: Sanity-check for ABCL - fset?
        if: matrix.LISP_IMPL == 'abcl'
        run: |
          cat <<EOF > run-tests.lisp
          (load "/.abclrc")
            ;; Ensure fiasco is patched in abcl
            (ql:quickload :fiasco) (load "compat/abcl-fiasco-patch")
          (cl:handler-case
            (cl:progn
              (ql:quickload :fset)
              (format *error-output* "~%ABCL loads FSet!~%")
              (asdf:test-system :fset)
              (format *error-output* "~%ABCL can test FSet!~%")
              (uiop:quit 0))
            (cl:error (c)
              (declare (ignore c))
              (uiop:quit 1)))
          EOF
          abcl --noinform --noinit --nosystem --batch --load run-tests.lisp < /dev/null

      - name: Sanity-check for CLASP - serapeum?
        if: matrix.LISP_IMPL == 'clasp'
        run: |
          cat <<EOF > run-tests.lisp
          ;;; Clasp cannot find /.clasprc - copy its code here instead.
          ;; (load "/.clasprc")
            #-quicklisp (load "/root/quicklisp/setup.lisp")
            (setf ql:*local-project-directories* (quote ("/extras" "/lisp")))
          (ql:quickload :serapeum)
          (format *error-output* "~%CLASP loads Serapeum!~%")
          (asdf:test-system :serapeum)
          (format *error-output* "~%CLASP can test Serapeum!~%")
          EOF
          clasp --script run-tests.lisp
