name: Porting (2 abcl, ecl, clasp)

on:
  push:
    branches: [ "compat-in-small-pieces" ]
  pull_request:
    branches: [ "compat-in-small-pieces" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: configure
      run: ./configure
    - name: make
      run: make
    - name: make check
      run: make check
    - name: make distcheck
      run: make distcheck
