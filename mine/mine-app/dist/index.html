<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mine</title>
  <link rel="stylesheet" href="./xterm.css">
  <style>
    @font-face {
      font-family: 'Iosevka Fixed Slab Extended';
      src: url('./fonts/IosevkaFixedSlab-Extended.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Iosevka Fixed Slab Extended';
      src: url('./fonts/IosevkaFixedSlab-ExtendedBold.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
    }
    @font-face {
      font-family: 'Iosevka Fixed Slab Extended';
      src: url('./fonts/IosevkaFixedSlab-ExtendedItalic.woff2') format('woff2');
      font-weight: 400;
      font-style: italic;
    }
    @font-face {
      font-family: 'Iosevka Fixed Slab Extended';
      src: url('./fonts/IosevkaFixedSlab-ExtendedItalic.woff2') format('woff2');
      font-weight: 400;
      font-style: oblique;
    }
    @font-face {
      font-family: 'Iosevka Fixed Slab Extended';
      src: url('./fonts/IosevkaFixedSlab-ExtendedBoldItalic.woff2') format('woff2');
      font-weight: 700;
      font-style: italic;
    }
    @font-face {
      font-family: 'Iosevka Fixed Slab Extended';
      src: url('./fonts/IosevkaFixedSlab-ExtendedBoldItalic.woff2') format('woff2');
      font-weight: 700;
      font-style: oblique;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #terminal { width: 100%; height: 100%; }
    .xterm .xterm-viewport::-webkit-scrollbar { width: 0; height: 0; }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>
